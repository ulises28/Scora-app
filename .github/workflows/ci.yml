name: Scora QA Automation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  unit-tests:
    name: Core Logic Tests (Vitest)
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-tests') }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Set up configuration file
        run: cp src/config.example.ts src/config.ts

      - name: Run Unit Tests
        run: npm test -- run

  e2e-tests:
    name: Browser Tests (Playwright / Docker)
    needs: unit-tests # CRITICAL: Only run if unit tests pass
    if: |
      always() && 
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-tests')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up configuration file
        run: cp src/config.example.ts src/config.ts

      - name: Build Playwright Docker Image
        run: docker build -f Dockerfile.playwright -t scora-e2e .

      - name: Run E2E Tests inside Docker
        run: |
          docker run --rm \
            -e CI=true \
            -e VITE_STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }} \
            -e VITE_STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -v ${{ github.workspace }}/blob-report:/app/blob-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            scora-e2e

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() # Upload report even if tests fail
        with:
          name: blob-report
          path: blob-report/
          retention-days: 2

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 2

