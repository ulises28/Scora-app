name: Scora QA Automation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  unit-tests:
    name: Core Logic Tests (Vitest)
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-tests') }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Set up configuration file
        run: cp src/config.example.ts src/config.ts

      - name: Run Unit Tests
        run: npm test -- run

  e2e-tests:
    name: Browser Tests (Playwright / Docker)
    needs: unit-tests # CRITICAL: Only run if unit tests pass
    if: |
      always() && 
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-tests')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up configuration file
        run: cp src/config.example.ts src/config.ts

      - name: Build Playwright Docker Image
        run: docker build -f Dockerfile.playwright -t scora-e2e .

      - name: Run E2E Tests inside Docker
        run: |
          docker run --rm \
            -e CI=true \
            -e VITE_STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }} \
            -e VITE_STRAVA_CLIENT_SECRET=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            scora-e2e

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() # Upload report even if tests fail
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  smoke-test:
    name: Live Health Check (Post-Deploy)
    needs: e2e-tests
    # Only run on direct pushes to master/main (i.e., after a merge), not on PRs
    if: |
      always() &&
      github.event_name == 'push' &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Vercel deployment
        run: sleep 30

      - name: Hit /api/health and verify HTTP 200
        id: health_check
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/health_response.json -w "%{http_code}" https://scora-app.vercel.app/api/health)
          echo "Health check response:"
          cat /tmp/health_response.json
          echo ""
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check FAILED! App is degraded or down."
            exit 1
          fi
          echo "✅ Health check PASSED! App is healthy."

      - name: Send Slack Alert on Failure
        if: failure() && steps.health_check.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"⚠️ *CRITICAL ALERT:* The Scora `/api/health` check just failed in production. The app might be down!"}' \
          "$SLACK_WEBHOOK_URL"
